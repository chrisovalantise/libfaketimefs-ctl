name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.1). Must match pyproject.toml version.'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify version matches tag
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -eu
          pkg_version="v$(uv version --short)"
          if [ "$pkg_version" != "$RELEASE_TAG" ]; then
            echo "pyproject.toml version ($pkg_version) does not match release tag ($RELEASE_TAG)" >&2
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          uv build
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: libfaketimefs-ctl-dist
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: libfaketimefs-ctl-dist
          path: dist

      - name: List artifacts
        run: ls -la dist/

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag='${{ steps.tag.outputs.tag }}'
          shopt -s nullglob
          artifacts=(dist/*.whl dist/*.tar.gz)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${artifacts[@]}" --clobber
          else
            gh release create "$tag" "${artifacts[@]}" \
              --title "$tag" \
              --notes "Built libfaketimefs-ctl artifacts for $tag"
          fi
